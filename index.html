<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herramientas – Acceso rápido</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 4rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      font-weight: 600;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      margin: 0.8rem;
      width: 260px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }
    a {
      color: #a0e7e5;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <h1>Panel de Herramientas</h1>
<a href="https://github.com/yourusername/tools" target="_blank" class="bg-blue-600 text-white font-medium py-2 px-4 rounded hover:bg-blue-700 transition inline-block mb-4">Deploy to Cloudflare Pages</a>
  <div class="grid">
    <div class="card"><a href="tools/prisma-viewer.html">Prisma Viewer</a></div>
    <div class="card"><a href="tools/cURL-disector.html">cURL Disector</a></div>
    <div class="card"><a href="tools/TimeStream-Visualizer.html">TimeStream Visualizer</a></div>
  </div>
</body>
</html>
