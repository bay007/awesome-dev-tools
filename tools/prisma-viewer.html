<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisma Schema Visualizer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #161b27;
            --surface2: #1e2535;
            --border: #2a3347;
            --border-bright: #3d4f6e;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --accent: #7c6af7;
            --accent2: #38bdf8;
            --accent3: #34d399;
            --highlight-bg: rgba(124, 106, 247, 0.15);
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }
        #app { display: flex; height: 100vh; width: 100%; gap: 12px; padding: 14px; }
        #leftPanel {
            width: 40%;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(.4,0,.2,1);
        }
        #leftPanel.collapsed {
            width: 0 !important;
            min-width: 0 !important;
            opacity: 0;
            pointer-events: none;
        }
        #editorWrapper {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        #schemaInput {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            background: transparent;
            color: var(--text);
            caret-color: var(--accent);
            resize: none;
            outline: none;
            width: 100%;
            flex: 1;
            padding: 16px 16px 16px 52px;
            border: none;
            z-index: 10;
        }
        .editor-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            padding: 16px 16px 16px 52px;
            white-space: pre;
            color: transparent;
            z-index: 5;
        }
        .hl {
            background: var(--highlight-bg);
            border-left: 3px solid var(--accent);
            display: block;
            margin-left: -52px;
            padding-left: 49px;
        }
        #lineNumbers {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 40px;
            padding: 16px 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.85;
            color: var(--text-muted);
            text-align: right;
            border-right: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            pointer-events: none;
        }
        #rightPanel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #diagramContainer {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            position: relative;
        }
        .btn {
            border: none; cursor: pointer;
            font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px;
            border-radius: 8px; padding: 8px 16px;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
        #restoreBtn {
            position: fixed; left: 0; top: 50%; transform: translateY(-50%);
            z-index: 50; background: var(--accent); color: white;
            width: 24px; height: 50px; border-radius: 0 8px 8px 0;
            display: none; align-items: center; justify-content: center;
        }
        .vis-tooltip {
            background: var(--surface2) !important; color: white !important;
            border: 1px solid var(--border-bright) !important; padding: 8px !important;
            font-family: 'JetBrains Mono', monospace !important; border-radius: 6px !important;
        }
    </style>
</head>
<body>

<div id="restoreBtn">›</div>

<div id="app">
    <div id="leftPanel">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-500">Prisma Editor</h2>
            <div class="flex gap-2">
                <button class="btn btn-ghost p-2" id="collapseBtn">‹</button>
                <button class="btn btn-primary" id="renderBtn">Visualize</button>
            </div>
        </div>
        <div id="editorWrapper">
            <div id="lineNumbers"></div>
            <div class="editor-overlay" id="highlightOverlay"></div>
            <textarea id="schemaInput" spellcheck="false">model User {
  id    Int    @id @default(autoincrement())
  posts Post[]
}

model Post {
  id       Int    @id @default(autoincrement())
  author   User   @relation(fields: [authorId], references: [id])
  authorId Int
  title    String
}</textarea>
        </div>
        <div id="status" class="mt-3 text-[11px] font-mono text-slate-500 flex items-center gap-2">
            <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></div>
            <span id="statusText">Ready</span>
        </div>
    </div>

    <div id="rightPanel">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-500">Entity Diagram</h2>
            <div class="flex gap-4 items-center">
                <span id="stats" class="text-[10px] font-bold text-sky-400 bg-sky-400/10 px-2 py-1 rounded-full border border-sky-400/20">0 Models</span>
                <button class="btn btn-ghost" id="downloadBtn">Export PNG</button>
            </div>
        </div>
        <div id="diagramContainer">
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center opacity-30">
                <p>Press visualize to see the schema</p>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * Main Visualizer Logic
 * Fixed: Draggable nodes remain fixed, straight lines for relations.
 */
const elements = {
    input: document.getElementById('schemaInput'),
    container: document.getElementById('diagramContainer'),
    renderBtn: document.getElementById('renderBtn'),
    overlay: document.getElementById('highlightOverlay'),
    lines: document.getElementById('lineNumbers'),
    statusText: document.getElementById('statusText'),
    statusDot: document.getElementById('statusDot'),
    stats: document.getElementById('stats'),
    placeholder: document.getElementById('placeholder'),
    collapseBtn: document.getElementById('collapseBtn'),
    restoreBtn: document.getElementById('restoreBtn'),
    leftPanel: document.getElementById('leftPanel')
};

let network = null;
let modelMap = {};

// --- Relation Logic Fixed ---
function parseSchema(content) {
    const lines = content.split('\n');
    const models = {};
    const nodes = [];
    const edges = [];
    modelMap = {};

    let currentModel = null;
    let startLine = 0;

    lines.forEach((line, i) => {
        const trimmed = line.trim();
        const modelMatch = trimmed.match(/^model\s+(\w+)\s*\{/);
        
        if (modelMatch) {
            currentModel = modelMatch[1];
            startLine = i;
            models[currentModel] = { fields: [], start: i };
            return;
        }

        if (currentModel && trimmed === '}') {
            models[currentModel].end = i;
            modelMap[currentModel] = { start: startLine, end: i };
            currentModel = null;
            return;
        }

        if (currentModel && trimmed && !trimmed.startsWith('@@')) {
            const fieldMatch = trimmed.match(/^(\w+)\s+(\w+)(\[\]|\?)?(\s+.*)?$/);
            if (fieldMatch) {
                models[currentModel].fields.push({
                    name: fieldMatch[1],
                    type: fieldMatch[2],
                    modifier: fieldMatch[3] || '',
                    attributes: fieldMatch[4] || ''
                });
            }
        }
    });

    for (const [name, data] of Object.entries(models)) {
        let label = `<b>${name}</b>\n`;
        label += `<i>${'-'.repeat(name.length + 4)}</i>\n`;
        data.fields.forEach(f => {
            const isRel = models[f.type];
            label += `${isRel ? '◈' : '  '} ${f.name}: ${f.type}${f.modifier}\n`;
        });

        nodes.push({
            id: name,
            label: label,
            shape: 'box',
            margin: 15,
            font: { multi: 'html', face: 'JetBrains Mono', size: 13, color: '#e2e8f0' },
            color: { background: '#1e2535', border: '#3d4f6e', highlight: '#7c6af7' }
        });
    }

    const trackedRelations = new Set();

    for (const [sourceModel, data] of Object.entries(models)) {
        data.fields.forEach(field => {
            if (models[field.type]) {
                const targetModel = field.type;
                const pairKey = [sourceModel, targetModel].sort().join('-');
                
                if (trackedRelations.has(pairKey)) return;
                trackedRelations.add(pairKey);

                const sourceField = field;
                const targetField = models[targetModel].fields.find(f => f.type === sourceModel);

                let cardinality = "1 : 1";
                let arrows = "";

                if (sourceField.modifier === '[]' && (!targetField || targetField.modifier !== '[]')) {
                    cardinality = "1 : N";
                    arrows = { to: { enabled: true } };
                } else if (sourceField.modifier !== '[]' && (targetField && targetField.modifier === '[]')) {
                    cardinality = "1 : N";
                    arrows = { from: { enabled: true } };
                } else if (sourceField.modifier === '[]' && (targetField && targetField.modifier === '[]')) {
                    cardinality = "N : M";
                    arrows = { to: { enabled: true }, from: { enabled: true } };
                }

                edges.push({
                    from: sourceModel,
                    to: targetModel,
                    label: cardinality,
                    arrows: arrows,
                    // Straight lines as requested
                    smooth: false,
                    font: { size: 11, color: '#64748b', background: '#161b27' },
                    color: { color: '#3d4f6e', highlight: '#7c6af7' },
                    length: 250
                });
            }
        });
    }

    return { nodes, edges };
}

function render() {
    try {
        const { nodes, edges } = parseSchema(elements.input.value);
        if (!elements.container) return;
        if (elements.placeholder) elements.placeholder.style.display = 'none';
        
        const data = {
            nodes: new vis.DataSet(nodes),
            edges: new vis.DataSet(edges)
        };

        const options = {
            physics: {
                enabled: true,
                barnesHut: { 
                    gravitationalConstant: -2000, 
                    springLength: 200,
                    springConstant: 0.04,
                    damping: 0.09
                },
                stabilization: { 
                    iterations: 200,
                    updateInterval: 25
                }
            },
            edges: {
                smooth: false // Default to straight lines
            },
            interaction: { 
                hover: true,
                dragNodes: true,
                dragView: true
            }
        };

        if (network) network.destroy();
        network = new vis.Network(elements.container, data, options);

        // Crucial: Disable physics after stabilization so nodes stay where they are dragged
        network.on("stabilizationIterationsDone", function () {
            network.setOptions({ physics: { enabled: false } });
            elements.statusText.textContent = "Diagram ready (Fixed Positions)";
        });

        elements.stats.textContent = `${nodes.length} Models`;
        elements.statusText.textContent = "Stabilizing...";
        elements.statusDot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";

        network.on("click", (params) => {
            if (params.nodes.length > 0) {
                const nodeName = params.nodes[0];
                highlightLine(modelMap[nodeName]);
            } else {
                clearHighlight();
            }
        });

    } catch (e) {
        console.error(e);
        elements.statusText.textContent = "Parser Error";
        elements.statusDot.className = "w-2 h-2 rounded-full bg-red-500";
    }
}

function highlightLine(range) {
    if (!range) return;
    const lines = elements.input.value.split('\n');
    let html = '';
    lines.forEach((line, i) => {
        const content = line || ' ';
        if (i >= range.start && i <= range.end) {
            html += `<span class="hl">${content}</span>\n`;
        } else {
            html += `<span>${content}</span>\n`;
        }
    });
    elements.overlay.innerHTML = html;
    
    const lh = 22.1; 
    elements.input.scrollTo({ top: range.start * lh, behavior: 'smooth' });
}

function clearHighlight() {
    elements.overlay.innerHTML = '';
}

function updateLines() {
    const count = elements.input.value.split('\n').length;
    elements.lines.innerHTML = Array.from({length: count}, (_, i) => `<div>${i+1}</div>`).join('');
}

elements.renderBtn.onclick = render;
elements.input.oninput = updateLines;
elements.input.onscroll = () => {
    elements.overlay.scrollTop = elements.input.scrollTop;
    elements.lines.scrollTop = elements.input.scrollTop;
};

elements.collapseBtn.onclick = () => {
    elements.leftPanel.classList.add('collapsed');
    elements.restoreBtn.style.display = 'flex';
};

elements.restoreBtn.onclick = () => {
    elements.leftPanel.classList.remove('collapsed');
    elements.restoreBtn.style.display = 'none';
};

window.onload = () => {
    updateLines();
    render();
};
</script>
</body>
</html>
